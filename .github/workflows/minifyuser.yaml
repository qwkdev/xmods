name: Minify UserScript

on:
  push:
    branches:
      - main
    paths:
      - 'js/*.user.js'

permissions:
  contents: write

jobs:
  minify-js:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Terser
        run: npm install -g terser

      - name: Minify JavaScript files
        run: |
          mkdir -p scripts

          for file in js/*.js; do
            filename=$(basename "$file")

            # Extract userscript header if present
            awk '
              /^\/\/ ==UserScript==/ {inblock=1}
              inblock {print}
              /^\/\/ ==\/UserScript==/ {exit}
            ' "$file" > header.tmp

            # Remove header from source
            awk '
              BEGIN {skip=0}
              /^\/\/ ==UserScript==/ {skip=1}
              skip && /^\/\/ ==\/UserScript==/ {skip=0; next}
              !skip
            ' "$file" > body.tmp

            # Minify body
            terser body.tmp \
              --compress \
              --mangle \
              -o body.min.js

            # Reassemble
            if grep -q '^// ==UserScript==' header.tmp; then
              cat header.tmp body.min.js > "scripts/$filename"
            else
              cp body.min.js "scripts/$filename"
            fi
          done

      - name: Commit & Push minified files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add scripts/*.js
          git commit -m "Minified JS on push" || echo "No changes to commit"
          git push
